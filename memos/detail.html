<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课程详情 - OI 工具箱</title>
  <link rel="icon" href="../tx.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green:#52C41A; --green-light:#f0fbe8; --green-dark:#3da613;
      --blue:#3498db;  --blue-light:#ebf5fb;
      --orange:#e67e22;--orange-light:#fef5e7;
      --purple:#9d3dcf;--purple-light:#f5eefa;
      --bg:#f4f5f7; --white:#fff; --text:#1a1a1a;
      --text-sub:#8e8e93; --text-light:#b0b0b6; --border:#e8eaed;
      --shadow-sm:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.06);
      --shadow-md:0 4px 12px rgba(0,0,0,.08);
      --radius:10px;
      --font:'Noto Sans SC',-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
      --mono:'Menlo','Consolas','Courier New',monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
    a{color:var(--green-dark);text-decoration:none;transition:color .15s}
    a:hover{color:var(--green)}
    .topbar{background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
    .topbar-inner{max-width:1060px;margin:0 auto;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.1rem;color:var(--text)}
    .logo:hover{text-decoration:none;color:var(--text)}
    .logo-icon{width:32px;height:32px;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#fff;box-shadow:var(--shadow-sm)}
    .logo-icon img{width:100%;height:100%;object-fit:cover;display:block}
    .topbar-time{font-size:.78rem;color:var(--text-light);font-family:var(--mono)}
    .container{max-width:1060px;margin:0 auto;padding:28px 24px 60px}
    .breadcrumb{display:flex;align-items:center;gap:6px;font-size:.82rem;color:var(--text-sub);margin-bottom:20px;flex-wrap:wrap}
    .breadcrumb a{color:var(--text-sub)}
    .breadcrumb a:hover{color:var(--green)}
    .breadcrumb-sep{color:var(--text-light)}
    .hero{margin-bottom:28px}
    .hero-badge{display:inline-flex;align-items:center;gap:6px;font-size:.75rem;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:10px}
    .hero-badge.green {background:var(--green-light);color:var(--green-dark)}
    .hero-badge.blue  {background:var(--blue-light);color:var(--blue)}
    .hero-badge.orange{background:var(--orange-light);color:var(--orange)}
    .hero-badge.purple{background:var(--purple-light);color:var(--purple)}
    .hero h1{font-size:1.55rem;font-weight:700;letter-spacing:-.01em}
    .hero p{margin-top:6px;color:var(--text-sub);font-size:.88rem}
    .section{margin-bottom:28px}
    .section-title{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:14px}
    .section-title::before{content:'';width:4px;height:18px;background:var(--green);border-radius:2px;display:inline-block}
    .section-title.blue::before{background:var(--blue)}
    .section-title.purple::before{background:var(--purple)}
    .table-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden}
    .table-toolbar{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
    .count-badge{font-size:.72rem;font-weight:500;background:var(--green-light);color:var(--green-dark);padding:2px 10px;border-radius:20px}
    .count-badge.blue{background:var(--blue-light);color:var(--blue)}
    .count-badge.purple{background:var(--purple-light);color:var(--purple)}
    /* 课程内容列表 */
    .content-grid{display:grid;gap:12px}
    .content-card{border-radius:var(--radius);padding:18px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;transition:all .2s;box-shadow:var(--shadow-sm);text-decoration:none!important;color:var(--text)!important}
    .content-card.stripe-blue{background:#ffffff;border:1px solid var(--border)}
    .content-card.stripe-green{background:#f6fbf2;border:1px solid #d6efc7}
    .content-card:hover{box-shadow:var(--shadow-md);filter:brightness(.97);transform:translateY(-1px)}
    .content-card-left{display:flex;flex-direction:column;gap:6px}
    .content-card-title{font-weight:600;font-size:1rem}
    .content-card-meta{font-size:.75rem;color:var(--text-sub);display:flex;gap:12px}
    .content-card-arrow{color:var(--text-light);font-size:1.1rem;flex-shrink:0}
    /* 讲义列表 */
    .lecture-list{display:grid;gap:10px}
    .lecture-card{border-radius:var(--radius);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;transition:all .2s;box-shadow:var(--shadow-sm)}
    .lecture-card.stripe-blue{background:#ffffff;border:1px solid var(--border)}
    .lecture-card.stripe-yellow{background:#f6fbf2;border:1px solid #d6efc7}
    .lecture-card:hover{box-shadow:var(--shadow-md);filter:brightness(.97);transform:translateY(-1px)}
    .lecture-card-left{display:flex;flex-direction:column;gap:4px}
    .lecture-card-title{font-weight:600;font-size:.95rem;color:var(--text)}
    .lecture-card-title:hover{color:var(--green)}
    .lecture-card-meta{font-size:.75rem;color:var(--text-sub);display:flex;align-items:center;gap:8px}
    .lecture-tags{display:flex;flex-wrap:wrap;gap:4px}
    .lecture-tag{font-size:.7rem;padding:2px 7px;border-radius:4px;background:#f0f2f5;color:#5f6368}
    .lecture-arrow{color:var(--text-light);font-size:1rem;flex-shrink:0}
    .table-card .record-table-wrap{max-height:600px;overflow-y:auto;position:relative}
    .record-table{width:100%;border-collapse:collapse;font-size:.88rem}
    .record-table thead{position:sticky;top:0;z-index:2}
    .record-table thead th{text-align:left;padding:10px 20px;font-weight:600;font-size:.75rem;color:var(--text-sub);text-transform:uppercase;letter-spacing:.05em;background:#fafbfc;border-bottom:1px solid var(--border);white-space:nowrap}
    .record-table tbody tr{transition:background .1s}
    .record-table tbody tr:hover{background:#f7fbf3}
    .record-table tbody td{padding:12px 20px;border-bottom:1px solid #f0f1f3;vertical-align:middle}
    .record-table tbody tr:last-child td{border-bottom:none}
    .record-table tr.divider-row{background:transparent!important}
    .record-table tr.divider-row:hover{background:transparent!important}
    .record-table tr.divider-row td{padding:16px 20px;border-bottom:none}
    .problem-divider{display:flex;align-items:center;gap:12px;font-size:.85rem;font-weight:600;color:var(--text-sub)}
    .problem-divider::before,.problem-divider::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent)}
    .problem-divider::after{background:linear-gradient(to left,var(--border),transparent)}
    .problem-divider span{white-space:nowrap}
    .pid-link{color:var(--text);font-weight:500}
    .pid-link:hover{color:var(--green)}
    .platform-badge{font-size:.7rem;padding:2px 7px;border-radius:4px;font-weight:500}
    .platform-luogu{background:#f0fbe8;color:var(--green-dark)}
    .platform-codeforces{background:#ebf5fb;color:var(--blue)}
    .platform-atcoder{background:#fef5e7;color:var(--orange)}
    .matrix-wrap{overflow-x:auto;max-height:600px;overflow-y:auto;position:relative}
    .matrix-table{width:100%;border-collapse:collapse;font-size:.82rem;min-width:400px}
    .matrix-table thead{position:sticky;top:0;z-index:3}
    .matrix-table th{padding:9px 14px;font-weight:600;font-size:.72rem;color:var(--text-sub);background:#fafbfc;border-bottom:1px solid var(--border);white-space:nowrap;text-align:center}
    .matrix-table th.col-problem{text-align:left;position:sticky;left:0;z-index:4;background:#fafbfc;box-shadow:2px 0 4px rgba(0,0,0,.05)}
    .matrix-table td{padding:10px 14px;border-bottom:1px solid #f0f1f3;text-align:center;vertical-align:middle}
    .matrix-table tbody tr:last-child td{border-bottom:none}
    .matrix-table tbody tr:hover{background:#f7fbf3}
    .matrix-table td.col-problem{text-align:left;position:sticky;left:0;z-index:1;background:#fff;box-shadow:2px 0 4px rgba(0,0,0,.05)}
    .matrix-table tbody tr:hover td.col-problem{background:#f7fbf3}
    .status-ac{display:inline-block;width:10px;height:10px;border-radius:50%;background:#52c41a;box-shadow:0 0 0 3px #f0fbe8}
    .status-attempted{display:inline-block;width:10px;height:10px;border-radius:50%;background:#fa8c16;box-shadow:0 0 0 3px #fef5e7}
    .status-none{display:inline-block;width:10px;height:10px;border-radius:50%;background:#d9d9d9;box-shadow:0 0 0 3px #f0f2f5}
    .written-problem-row{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #f0f1f3}
    .written-problem-row:last-child{border-bottom:none}
    .written-problem-name{font-weight:500;font-size:.92rem}
    .btn-explain{font-size:.78rem;padding:5px 14px;border-radius:6px;background:var(--blue-light);color:var(--blue);text-decoration:none;font-weight:500;white-space:nowrap;transition:background .15s}
    .btn-explain:hover{background:#d0eaf8;color:var(--blue)}
    .contest-badge{font-size:.7rem;padding:2px 8px;border-radius:4px;background:#f0f2f5;color:#5f6368;margin-left:8px}
    .rank-table{width:100%;border-collapse:collapse;font-size:.85rem}
    .rank-table th{padding:9px 14px;font-weight:600;font-size:.72rem;color:var(--text-sub);background:#fafbfc;border-bottom:1px solid var(--border);text-align:center;white-space:nowrap}
    .rank-table th.col-left{text-align:left}
    .rank-table td{padding:10px 14px;border-bottom:1px solid #f0f1f3;text-align:center;vertical-align:middle}
    .rank-table tbody tr:last-child td{border-bottom:none}
    .rank-table tbody tr:hover{background:#f7fbf3}
    .rank-table td.col-left{text-align:left}
    .rank-num{font-weight:700;font-family:var(--mono)}
    .rank-num.gold{color:#f5a623}.rank-num.silver{color:#9b9b9b}.rank-num.bronze{color:#c47a3a}.rank-num.normal{color:var(--text)}
    .score-zero{color:var(--text-light)}
    .score-full{color:var(--green-dark);font-weight:600}
    .total-score{font-weight:700}
    .chart-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:18px 20px;margin-top:12px}
    .chart-title{font-size:.85rem;font-weight:700;color:var(--text-sub);margin-bottom:12px}
    .chart-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
    .legend-item{display:flex;align-items:center;gap:5px;font-size:.75rem;color:var(--text-sub)}
    .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .empty-state{text-align:center;padding:40px 20px;color:var(--text-light);font-size:.88rem}
    .site-footer{text-align:center;padding:20px 0 32px;font-size:.78rem;color:var(--text-light)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .hero{animation:fadeUp .35s ease both}
    .section{animation:fadeUp .35s ease .07s both}
    @media(max-width:768px){.topbar-time{display:none}.record-table thead th,.record-table tbody td{padding:9px 12px}.matrix-table th,.matrix-table td{padding:8px 10px}}
  </style>
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <a href="https://www.luogu.com.cn/user/728487" class="logo">
      <div class="logo-icon"><img src="../tx.jpg" alt="Showball's OI 工具箱"></div>
      <span>Showball's OI 工具箱</span>
    </a>
    <span class="topbar-time" id="clock"></span>
  </div>
</header>

<div class="container">
  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="hero">
    <div class="hero-badge" id="hero-badge"></div>
    <h1 id="hero-title">加载中…</h1>
    <p id="hero-desc"></p>
  </div>
  <div id="main-content"></div>
</div>

<footer class="site-footer">2026 &copy; Showball's OI 工具箱</footer>

<script>
const params  = new URLSearchParams(location.search);
const TYPE    = params.get('type');
const ID      = params.get('id');
const COURSE  = params.get('course');
const SECTION = params.get('section'); // 'written' | 'mock'

function problemUrl(platform, pid) {
  if (platform === 'luogu') return `https://www.luogu.com.cn/problem/${pid}`;
  if (platform === 'codeforces') {
    const m = pid.match(/^(\d+)([A-Za-z]\d*)$/);
    return m ? `https://codeforces.com/problemset/problem/${m[1]}/${m[2]}` : 'https://codeforces.com/';
  }
  if (platform === 'atcoder') {
    const parts = pid.split('_'), contest = parts.slice(0,-1).join('_');
    return `https://atcoder.jp/contests/${contest}/tasks/${pid}`;
  }
  return '#';
}

function platformBadge(p) {
  const map = {luogu:'洛谷', codeforces:'CF', atcoder:'AtCoder'};
  return `<span class="platform-badge platform-${p}">${map[p]||p}</span>`;
}

function breadcrumb(items) {
  const base = [
    `<a href="../index.html">首页</a>`,
    `<span class="breadcrumb-sep">›</span>`,
    `<a href="../memos.html">课程</a>`
  ];
  items.forEach(item => {
    base.push(`<span class="breadcrumb-sep">›</span>`);
    base.push(item.href ? `<a href="${item.href}">${item.label}</a>` : `<span>${item.label}</span>`);
  });
  document.getElementById('breadcrumb').innerHTML = base.join('');
}

function renderLectureList(lectures) {
  if (!lectures.length) return `<div class="empty-state">暂无讲义</div>`;
  return `<div class="lecture-list">${lectures.map((l,i) => `
    <a class="lecture-card ${i%2===0?'stripe-blue':'stripe-yellow'}" href="../${l.href}">
      <div class="lecture-card-left">
        <span class="lecture-card-title">${l.title}</span>
        <div class="lecture-card-meta">
          <span>${l.created}</span>
          ${l.tags.length ? `<div class="lecture-tags">${l.tags.map(t=>`<span class="lecture-tag">${t}</span>`).join('')}</div>` : ''}
        </div>
      </div>
      <span class="lecture-arrow">→</span>
    </a>`).join('')}</div>`;
}

function renderProblemsTable(problems, showSolution=false, lectures=[]) {
  if (!problems.length) return `<div class="empty-state">暂无练习题目</div>`;
  const lectureMap = {};
  lectures.forEach(l => lectureMap[l.id] = l.title);

  let rows = [];
  let idx = 0;
  problems.forEach(p => {
    if (p.type === 'divider') {
      const lecTitle = lectureMap[p.lecture] || p.lecture;
      rows.push(`<tr class="divider-row"><td colspan="${showSolution?4:3}"><div class="problem-divider"><span>${lecTitle}</span></div></td></tr>`);
    } else {
      idx++;
      rows.push(`<tr style="background:${idx%2===0?'#ffffff':'#f6fbf2'}">
        <td style="color:var(--text-light);font-family:var(--mono);font-size:.8rem">${idx}</td>
        <td><a class="pid-link" href="${problemUrl(p.platform,p.pid)}" target="_blank">${p.pid}&nbsp;&nbsp;${p.title}</a></td>
        <td>${platformBadge(p.platform)}</td>
        ${showSolution?`<td class="col-solution">${p.href?`<a href="../${p.href}">查看题解 →</a>`:'—'}</td>`:''}</tr>`);
    }
  });

  const realCount = problems.filter(p => p.type !== 'divider').length;
  return `<div class="table-card">
    <div class="table-toolbar">
      <span class="section-title" style="margin:0">练习题目</span>
      <span class="count-badge blue">共 ${realCount} 题</span>
    </div>
    <div class="record-table-wrap">
      <table class="record-table">
        <thead><tr><th>#</th><th>题号 / 题名</th><th>平台</th>${showSolution?'<th>题解</th>':''}</tr></thead>
        <tbody>${rows.join('')}</tbody>
      </table>
    </div>
  </div>`;
}

function renderMatrix(problems, students, subs) {
  if (!students.length) return `<div class="empty-state">暂无学生数据</div>`;
  const realProblems = problems.filter(p => p.type !== 'divider');
  if (!realProblems.length) return '';
  return `<div class="table-card">
    <div class="table-toolbar">
      <span class="section-title" style="margin:0">学生完成情况</span>
      <span class="count-badge purple">${students.length} 名学生</span>
    </div>
    <div class="matrix-wrap">
      <table class="matrix-table">
        <thead><tr>
          <th class="col-problem">题目</th>
          ${students.map(s=>`<th>${s.name}</th>`).join('')}
        </tr></thead>
        <tbody>${realProblems.map((p,i) => {
          const cells = students.map(s => {
            const data = ((subs[s.id]||{})[p.platform]||{})[p.pid];
            const status = typeof data === 'string' ? data : (data?.status ?? null);
            if (status === 'ac')        return `<td><span class="status-ac" title="已通过"></span></td>`;
            if (status === 'attempted') return `<td><span class="status-attempted" title="尝试中"></span></td>`;
            return `<td><span class="status-none" title="未做"></span></td>`;
          }).join('');
          return `<tr style="background:${i%2===0?'#ffffff':'#f6fbf2'}">
            <td class="col-problem"><a class="pid-link" href="${problemUrl(p.platform,p.pid)}" target="_blank">${p.pid} ${p.title}</a></td>
            ${cells}
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>
  </div>`;
}

async function init() {
  const [coursesRes, lecturesRes] = await Promise.all([
    fetch('../memos/courses.json'),
    fetch('../memos/lectures.json')
  ]);
  const coursesData = await coursesRes.json();
  const allLectures = await lecturesRes.json();

  // ── 知识点页：讲义列表 ──
  if (TYPE === 'topic') {
    const topic = (coursesData.topics||[]).find(t => t.id === ID);
    if (!topic) { document.getElementById('hero-title').textContent = '未找到知识点'; return; }
    document.title = `${topic.title} - OI 工具箱`;
    breadcrumb([{label: topic.title}]);
    document.getElementById('hero-badge').textContent = '知识点';
    document.getElementById('hero-badge').className = `hero-badge ${topic.color||'blue'}`;
    document.getElementById('hero-title').textContent = topic.title;
    const lecs = allLectures.filter(l => (l.topics||[]).includes(ID));
    document.getElementById('hero-desc').textContent = `${lecs.length} 篇讲义`;
    document.getElementById('main-content').innerHTML = `
      <div class="section"><div class="section-title">讲义列表</div>${renderLectureList(lecs)}</div>`;
    return;
  }

  // ── 课程页：课程内容列表 ──
  if (TYPE === 'course') {
    const course = (coursesData.courses||[]).find(c => c.id === ID);
    if (!course) { document.getElementById('hero-title').textContent = '未找到课程'; return; }
    document.title = `${course.title} - OI 工具箱`;
    breadcrumb([{label: course.title}]);
    document.getElementById('hero-badge').textContent = '课程';
    document.getElementById('hero-badge').className = `hero-badge ${course.color||'green'}`;
    document.getElementById('hero-title').textContent = course.title;

    // contest-prep 特殊渲染：只显示「笔试题目」和「上机测试」两个入口
    if (ID === 'contest-prep') {
      const contents = course.contents || [];
      const writtenCount = new Set(contents.filter(c=>c.type==='written').map(c=>c.contest)).size;
      const mockCount    = new Set(contents.filter(c=>c.type==='mock').map(c=>c.contest)).size;
      document.getElementById('hero-desc').textContent = '笔试题目 · 上机测试';
      document.getElementById('main-content').innerHTML = `
        <div class="section">
          <div class="content-grid">
            <a class="content-card stripe-blue" href="detail.html?type=contest-section&section=written">
              <div class="content-card-left">
                <span class="content-card-title">笔试题目</span>
                <div class="content-card-meta"><span>${writtenCount} 个比赛类型</span></div>
              </div><span class="content-card-arrow">›</span>
            </a>
            <a class="content-card stripe-green" href="detail.html?type=contest-section&section=mock">
              <div class="content-card-left">
                <span class="content-card-title">上机测试</span>
                <div class="content-card-meta"><span>${mockCount} 个比赛类型</span></div>
              </div><span class="content-card-arrow">›</span>
            </a>
          </div>
        </div>`;
      return;
    }

    const contents = course.contents || [];
    document.getElementById('hero-desc').textContent = `${contents.length} 个课程内容`;
    if (!contents.length) {
      document.getElementById('main-content').innerHTML = `<div class="empty-state">暂无课程内容</div>`;
      return;
    }
    document.getElementById('main-content').innerHTML = `
      <div class="section">
        <div class="content-grid">${contents.map((c, i) => {
          const stripe = i % 2 === 0 ? 'stripe-blue' : 'stripe-green';
          const lecCount = (c.lectures||[]).length;
          const probCount = (c.problems||[]).length;
          return `<a class="content-card ${stripe}" href="detail.html?type=content&course=${ID}&id=${c.id}">
            <div class="content-card-left">
              <span class="content-card-title">${c.title}</span>
              <div class="content-card-meta"><span>${lecCount} 篇讲义</span><span>${probCount} 道练习</span></div>
            </div><span class="content-card-arrow">›</span></a>`;
        }).join('')}</div>
      </div>`;
    return;
  }

  // ── 竞赛备赛分区页：按比赛类型分组显示 ──
  if (TYPE === 'contest-section') {
    const course = (coursesData.courses||[]).find(c => c.id === 'contest-prep');
    const sectionLabel = SECTION === 'written' ? '笔试题目' : '上机测试';
    document.title = `${sectionLabel} - OI 工具箱`;
    breadcrumb([
      {label: '竞赛备赛专项课程', href: `detail.html?type=course&id=contest-prep`},
      {label: sectionLabel}
    ]);
    document.getElementById('hero-badge').textContent = '竞赛备赛';
    document.getElementById('hero-badge').className = `hero-badge ${course?.color||'green'}`;
    document.getElementById('hero-title').textContent = sectionLabel;

    const contents = (course?.contents||[]).filter(c => c.type === SECTION);
    // 按 contest 分组
    const groups = {};
    contents.forEach(c => { (groups[c.contest] = groups[c.contest]||[]).push(c); });
    const contestOrder = ['GESP','CSP-J','CSP-S','NOIP','粤港澳大湾区信息学','南海区信息学'];
    const sortedContests = Object.keys(groups).sort((a,b) => {
      const ai = contestOrder.indexOf(a), bi = contestOrder.indexOf(b);
      return (ai===-1?99:ai) - (bi===-1?99:bi);
    });

    document.getElementById('hero-desc').textContent = `${sortedContests.length} 个比赛类型`;

    if (!sortedContests.length) {
      document.getElementById('main-content').innerHTML = `<div class="empty-state">暂无内容</div>`;
      return;
    }

    // mock 分区需要学生数据用于折线图
    let students = [];
    if (SECTION === 'mock') {
      try { students = await (await fetch('../students/students.json')).json(); } catch(e) {}
    }

    // 调色板（学生折线颜色）
    const PALETTE = ['#52c41a','#3498db','#e67e22','#9d3dcf','#e74c3c','#1abc9c','#f39c12'];

    function renderTrendChart(contest, mocks, students) {
      if (mocks.length < 2 || !students.length) return '';
      // 计算每场每个学生总分
      const labels = mocks.map(m => m.title);
      const series = students.map((s, si) => {
        const pts = mocks.map(m => {
          const sc = (m.scores||{})[s.id] || {};
          return (m.problems||[]).reduce((sum, p) => sum + (sc[p.pid] ?? 0), 0);
        });
        return {name: s.name, pts, color: PALETTE[si % PALETTE.length]};
      });

      const W = 560, H = 160, PL = 36, PR = 16, PT = 16, PB = 32;
      const cw = W - PL - PR, ch = H - PT - PB;
      const allVals = series.flatMap(s => s.pts);
      const maxVal = Math.max(...allVals, 1);
      const xStep = mocks.length > 1 ? cw / (mocks.length - 1) : cw;

      const x = i => PL + i * xStep;
      const y = v => PT + ch - (v / maxVal) * ch;

      // 网格线
      const gridLines = [0, 0.25, 0.5, 0.75, 1].map(r => {
        const yy = PT + ch - r * ch;
        return `<line x1="${PL}" y1="${yy}" x2="${W-PR}" y2="${yy}" stroke="#f0f1f3" stroke-width="1"/>
                 <text x="${PL-4}" y="${yy+4}" text-anchor="end" font-size="9" fill="#b0b0b6">${Math.round(r*maxVal)}</text>`;
      }).join('');

      // X 轴标签
      const xLabels = labels.map((l, i) =>
        `<text x="${x(i)}" y="${H-4}" text-anchor="middle" font-size="9" fill="#8e8e93">${l.replace(/模拟赛\s*/,'#').replace(/.*#/,'#')}</text>`
      ).join('');

      // 折线 + 点
      const lines = series.map(s => {
        const pts = s.pts.map((v, i) => `${x(i)},${y(v)}`).join(' ');
        const dots = s.pts.map((v, i) =>
          `<circle cx="${x(i)}" cy="${y(v)}" r="3" fill="${s.color}" stroke="#fff" stroke-width="1.5">
             <title>${s.name}: ${v}分</title>
           </circle>`
        ).join('');
        return `<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" opacity=".85"/>
                ${dots}`;
      }).join('');

      const legend = series.map(s =>
        `<span class="legend-item"><span class="legend-dot" style="background:${s.color}"></span>${s.name}</span>`
      ).join('');

      return `<div class="chart-card">
        <div class="chart-title">${contest} — 历次模拟赛总分趋势</div>
        <svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px;display:block">
          ${gridLines}${xLabels}${lines}
        </svg>
        <div class="chart-legend">${legend}</div>
      </div>`;
    }

    const sectionsHtml = sortedContests.map(contest => {
      const items = groups[contest];
      const cards = items.map((c, i) => {
        const stripe = i % 2 === 0 ? 'stripe-blue' : 'stripe-green';
        if (SECTION === 'written') {
          return `<a class="content-card ${stripe}" href="detail.html?type=written&course=contest-prep&id=${c.id}">
            <div class="content-card-left">
              <span class="content-card-title">${c.title}</span>
              <div class="content-card-meta"><span>${(c.lectures||[]).length} 篇讲义</span><span>${(c.problems||[]).length} 套题目</span></div>
            </div><span class="content-card-arrow">›</span></a>`;
        }
        return `<a class="content-card ${stripe}" href="detail.html?type=mock&course=contest-prep&id=${c.id}">
          <div class="content-card-left">
            <span class="content-card-title">${c.title}</span>
            <div class="content-card-meta"><span>${(c.problems||[]).length} 道题目</span></div>
          </div><span class="content-card-arrow">›</span></a>`;
      }).join('');
      const chart = SECTION === 'mock' ? renderTrendChart(contest, items, students) : '';
      return `<div class="section">
        <div class="section-title">${contest}</div>
        <div class="content-grid">${cards}</div>
        ${chart}
      </div>`;
    }).join('');

    document.getElementById('main-content').innerHTML = sectionsHtml;
    return;
  }

  // ── 课程内容页：讲义 + 题目 + 学生矩阵 ──
  if (TYPE === 'content') {
    const course = (coursesData.courses||[]).find(c => c.id === COURSE);
    const content = (course?.contents||[]).find(c => c.id === ID);
    if (!content || !course) { document.getElementById('hero-title').textContent = '未找到内容'; return; }
    document.title = `${content.title} - OI 工具箱`;
    breadcrumb([
      {label: course.title, href: `detail.html?type=course&id=${COURSE}`},
      {label: content.title}
    ]);
    document.getElementById('hero-badge').textContent = course.title;
    document.getElementById('hero-badge').className = `hero-badge ${course.color||'green'}`;
    document.getElementById('hero-title').textContent = content.title;
    const lecs = allLectures.filter(l => (content.lectures||[]).includes(l.id));
    const problems = content.problems || [];
    document.getElementById('hero-desc').textContent = `${lecs.length} 篇讲义 · ${problems.length} 道练习`;

    let students = [], subs = {};
    try {
      const [stuRes, subRes] = await Promise.all([
        fetch('../students/students.json'),
        fetch('../students/submissions.json')
      ]);
      students = await stuRes.json();
      subs = (await subRes.json()).data || {};
    } catch(e) {}

    document.getElementById('main-content').innerHTML = `
      <div class="section"><div class="section-title">讲义</div>${renderLectureList(lecs)}</div>
      <div class="section">${renderProblemsTable(problems, false, lecs)}</div>
      <div class="section">${renderMatrix(problems, students, subs)}</div>`;
  }

  // ── 笔试专题页：讲义 + 笔试题目列表 + 学生完成情况 ──
  if (TYPE === 'written') {
    const course = (coursesData.courses||[]).find(c => c.id === COURSE);
    const content = (course?.contents||[]).find(c => c.id === ID);
    if (!content || !course) { document.getElementById('hero-title').textContent = '未找到内容'; return; }
    document.title = `${content.title} - OI 工具箱`;
    breadcrumb([
      {label: '竞赛备赛专项课程', href: `detail.html?type=course&id=contest-prep`},
      {label: '笔试题目', href: `detail.html?type=contest-section&section=written`},
      {label: content.title}
    ]);
    document.getElementById('hero-badge').textContent = content.contest || '笔试';
    document.getElementById('hero-badge').className = `hero-badge ${course.color||'green'}`;
    document.getElementById('hero-title').textContent = content.title;
    const lecs = allLectures.filter(l => (content.lectures||[]).includes(l.id));
    const problems = content.problems || [];
    document.getElementById('hero-desc').textContent = `${lecs.length} 篇讲义 · ${problems.length} 套笔试题目`;

    let students = [], subs = {};
    try {
      const [stuRes, subRes] = await Promise.all([
        fetch('../students/students.json'),
        fetch('../students/submissions.json')
      ]);
      students = await stuRes.json();
      subs = (await subRes.json()).data || {};
    } catch(e) {}

    const writtenProblemsHtml = problems.length === 0
      ? `<div class="empty-state">暂无笔试题目</div>`
      : `<div class="table-card">
          <div class="table-toolbar">
            <span class="section-title" style="margin:0">笔试题目</span>
            <span class="count-badge blue">共 ${problems.length} 套</span>
          </div>
          ${problems.map((p, i) => `
            <div class="written-problem-row" style="background:${i%2===0?'#ffffff':'#f6fbf2'}">
              <span class="written-problem-name">${p.name}</span>
              <a class="btn-explain" href="${p.url}" target="_blank">查看题目 →</a>
            </div>`).join('')}
        </div>`;

    // 将笔试题目映射为 matrix 兼容格式（platform=luogu, pid=wp-id）
    const matrixProblems = problems.map(p => ({pid: p.id, platform: 'luogu', title: p.name}));

    document.getElementById('main-content').innerHTML = `
      <div class="section"><div class="section-title">讲义</div>${renderLectureList(lecs)}</div>
      <div class="section">${writtenProblemsHtml}</div>
      <div class="section">${renderMatrix(matrixProblems, students, subs)}</div>`;
  }

  // ── 上机模拟赛页：题目列表 + 排名 + 补题矩阵 ──
  if (TYPE === 'mock') {
    const course = (coursesData.courses||[]).find(c => c.id === COURSE);
    const content = (course?.contents||[]).find(c => c.id === ID);
    if (!content || !course) { document.getElementById('hero-title').textContent = '未找到内容'; return; }
    document.title = `${content.title} - OI 工具箱`;
    breadcrumb([
      {label: '竞赛备赛专项课程', href: `detail.html?type=course&id=contest-prep`},
      {label: '上机测试', href: `detail.html?type=contest-section&section=mock`},
      {label: content.title}
    ]);
    document.getElementById('hero-badge').textContent = content.contest || '上机';
    document.getElementById('hero-badge').className = `hero-badge ${course.color||'green'}`;
    document.getElementById('hero-title').textContent = content.title;
    const problems = content.problems || [];
    const scores = content.scores || {};
    document.getElementById('hero-desc').textContent = `${problems.length} 道题目`;

    let students = [], subs = {};
    try {
      const [stuRes, subRes] = await Promise.all([
        fetch('../students/students.json'),
        fetch('../students/submissions.json')
      ]);
      const allStudents = await stuRes.json();
      subs = (await subRes.json()).data || {};
      const participants = content.participants || [];
      students = participants.length
        ? allStudents.filter(s => participants.includes(s.id))
        : allStudents;
    } catch(e) {}

    // 排名表
    const ranked = students.map(s => {
      const stuScores = scores[s.id] || {};
      const total = problems.reduce((sum, p) => sum + (stuScores[p.pid] ?? 0), 0);
      return {s, stuScores, total};
    }).sort((a, b) => b.total - a.total);

    const rankHtml = students.length === 0
      ? `<div class="empty-state">暂无学生数据</div>`
      : `<div class="table-card">
          <div class="table-toolbar">
            <span class="section-title" style="margin:0">排名</span>
            <span class="count-badge purple">${students.length} 名学生</span>
          </div>
          <div class="matrix-wrap">
            <table class="rank-table">
              <thead><tr>
                <th class="col-left">#</th>
                <th class="col-left">姓名</th>
                ${problems.map(p => `<th>${p.pid}<br><span style="font-weight:400;color:var(--text-light)">${p.full_score??100}分</span></th>`).join('')}
                <th>总分</th>
              </tr></thead>
              <tbody>${ranked.map(({s, stuScores, total}, i) => {
                const rankClass = i===0?'gold':i===1?'silver':i===2?'bronze':'normal';
                const rankDisplay = i===0?'🥇':i===1?'🥈':i===2?'🥉':`<span class="rank-num normal">&nbsp;${i+1}</span>`;
                const cells = problems.map(p => {
                  const sc = stuScores[p.pid] ?? null;
                  if (sc === null) return `<td class="score-zero">—</td>`;
                  const full = p.full_score ?? 100;
                  return `<td class="${sc===full?'score-full':sc===0?'score-zero':''}">${sc}</td>`;
                }).join('');
                return `<tr style="background:${i%2===0?'#ffffff':'#f6fbf2'}">
                  <td class="col-left">${rankDisplay}</td>
                  <td class="col-left">${s.name}</td>
                  ${cells}
                  <td><span class="total-score">${total}</span></td>
                </tr>`;
              }).join('')}</tbody>
            </table>
          </div>
        </div>`;

    document.getElementById('main-content').innerHTML = `
      <div class="section">${renderProblemsTable(problems, true)}</div>
      <div class="section">${rankHtml}</div>
      <div class="section">${renderMatrix(problems, students, subs)}</div>`;
  }
}

(function tick() {
  const now = new Date(), p = n => String(n).padStart(2,'0');
  document.getElementById('clock').textContent =
    now.getFullYear()+'-'+p(now.getMonth()+1)+'-'+p(now.getDate())+
    ' '+p(now.getHours())+':'+p(now.getMinutes())+':'+p(now.getSeconds());
  setTimeout(tick, 1000);
})();

init();
</script>
</body>
</html>
