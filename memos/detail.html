<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>备忘录详情 - OI 工具箱</title>
  <link rel="icon" href="../tx.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green:#52C41A; --green-light:#f0fbe8; --green-dark:#3da613;
      --blue:#3498db;  --blue-light:#ebf5fb;
      --orange:#e67e22;--orange-light:#fef5e7;
      --purple:#9d3dcf;--purple-light:#f5eefa;
      --bg:#f4f5f7; --white:#fff; --text:#1a1a1a;
      --text-sub:#8e8e93; --text-light:#b0b0b6; --border:#e8eaed;
      --shadow-sm:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.06);
      --shadow-md:0 4px 12px rgba(0,0,0,.08);
      --radius:10px;
      --font:'Noto Sans SC',-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
      --mono:'Menlo','Consolas','Courier New',monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
    a{color:var(--green-dark);text-decoration:none;transition:color .15s}
    a:hover{color:var(--green)}
    .topbar{background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
    .topbar-inner{max-width:1060px;margin:0 auto;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.1rem;color:var(--text)}
    .logo:hover{text-decoration:none;color:var(--text)}
    .logo-icon{width:32px;height:32px;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#fff;box-shadow:var(--shadow-sm)}
    .logo-icon img{width:100%;height:100%;object-fit:cover;display:block}
    .topbar-time{font-size:.78rem;color:var(--text-light);font-family:var(--mono)}
    .container{max-width:1060px;margin:0 auto;padding:28px 24px 60px}
    .breadcrumb{display:flex;align-items:center;gap:6px;font-size:.82rem;color:var(--text-sub);margin-bottom:20px;flex-wrap:wrap}
    .breadcrumb a{color:var(--text-sub)}
    .breadcrumb a:hover{color:var(--green)}
    .breadcrumb-sep{color:var(--text-light)}
    .hero{margin-bottom:28px}
    .hero-badge{display:inline-flex;align-items:center;gap:6px;font-size:.75rem;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:10px}
    .hero-badge.green {background:var(--green-light);color:var(--green-dark)}
    .hero-badge.blue  {background:var(--blue-light);color:var(--blue)}
    .hero-badge.orange{background:var(--orange-light);color:var(--orange)}
    .hero-badge.purple{background:var(--purple-light);color:var(--purple)}
    .hero h1{font-size:1.55rem;font-weight:700;letter-spacing:-.01em}
    .hero p{margin-top:6px;color:var(--text-sub);font-size:.88rem}
    .section{margin-bottom:28px}
    .section-title{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:14px}
    .section-title::before{content:'';width:4px;height:18px;background:var(--green);border-radius:2px;display:inline-block}
    .section-title.blue::before{background:var(--blue)}
    .section-title.purple::before{background:var(--purple)}
    .table-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden}
    .table-toolbar{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
    .count-badge{font-size:.72rem;font-weight:500;background:var(--green-light);color:var(--green-dark);padding:2px 10px;border-radius:20px}
    .count-badge.blue{background:var(--blue-light);color:var(--blue)}
    .count-badge.purple{background:var(--purple-light);color:var(--purple)}
    /* 课程内容列表 */
    .content-grid{display:grid;gap:12px}
    .content-card{border-radius:var(--radius);padding:18px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;transition:all .2s;box-shadow:var(--shadow-sm);text-decoration:none!important;color:var(--text)!important}
    .content-card.stripe-blue{background:#ffffff;border:1px solid var(--border)}
    .content-card.stripe-green{background:#f6fbf2;border:1px solid #d6efc7}
    .content-card:hover{box-shadow:var(--shadow-md);filter:brightness(.97);transform:translateY(-1px)}
    .content-card-left{display:flex;flex-direction:column;gap:6px}
    .content-card-title{font-weight:600;font-size:1rem}
    .content-card-meta{font-size:.75rem;color:var(--text-sub);display:flex;gap:12px}
    .content-card-arrow{color:var(--text-light);font-size:1.1rem;flex-shrink:0}
    /* 讲义列表 */
    .lecture-list{display:grid;gap:10px}
    .lecture-card{border-radius:var(--radius);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;transition:all .2s;box-shadow:var(--shadow-sm)}
    .lecture-card.stripe-blue{background:#ffffff;border:1px solid var(--border)}
    .lecture-card.stripe-yellow{background:#f6fbf2;border:1px solid #d6efc7}
    .lecture-card:hover{box-shadow:var(--shadow-md);filter:brightness(.97);transform:translateY(-1px)}
    .lecture-card-left{display:flex;flex-direction:column;gap:4px}
    .lecture-card-title{font-weight:600;font-size:.95rem;color:var(--text)}
    .lecture-card-title:hover{color:var(--green)}
    .lecture-card-meta{font-size:.75rem;color:var(--text-sub);display:flex;align-items:center;gap:8px}
    .lecture-tags{display:flex;flex-wrap:wrap;gap:4px}
    .lecture-tag{font-size:.7rem;padding:2px 7px;border-radius:4px;background:#f0f2f5;color:#5f6368}
    .lecture-arrow{color:var(--text-light);font-size:1rem;flex-shrink:0}
    .record-table{width:100%;border-collapse:collapse;font-size:.88rem}
    .record-table thead th{text-align:left;padding:10px 20px;font-weight:600;font-size:.75rem;color:var(--text-sub);text-transform:uppercase;letter-spacing:.05em;background:#fafbfc;border-bottom:1px solid var(--border);white-space:nowrap}
    .record-table tbody tr{transition:background .1s}
    .record-table tbody tr:hover{background:#f7fbf3}
    .record-table tbody td{padding:12px 20px;border-bottom:1px solid #f0f1f3;vertical-align:middle}
    .record-table tbody tr:last-child td{border-bottom:none}
    .pid-link{color:var(--text);font-weight:500}
    .pid-link:hover{color:var(--green)}
    .platform-badge{font-size:.7rem;padding:2px 7px;border-radius:4px;font-weight:500}
    .platform-luogu{background:#f0fbe8;color:var(--green-dark)}
    .platform-codeforces{background:#ebf5fb;color:var(--blue)}
    .platform-atcoder{background:#fef5e7;color:var(--orange)}
    .matrix-wrap{overflow-x:auto}
    .matrix-table{width:100%;border-collapse:collapse;font-size:.82rem;min-width:400px}
    .matrix-table th{padding:9px 14px;font-weight:600;font-size:.72rem;color:var(--text-sub);background:#fafbfc;border-bottom:1px solid var(--border);white-space:nowrap;text-align:center}
    .matrix-table th.col-problem{text-align:left}
    .matrix-table td{padding:10px 14px;border-bottom:1px solid #f0f1f3;text-align:center;vertical-align:middle}
    .matrix-table tbody tr:last-child td{border-bottom:none}
    .matrix-table tbody tr:hover{background:#f7fbf3}
    .matrix-table td.col-problem{text-align:left}
    .status-ac{display:inline-block;width:10px;height:10px;border-radius:50%;background:#52c41a;box-shadow:0 0 0 3px #f0fbe8}
    .status-attempted{display:inline-block;width:10px;height:10px;border-radius:50%;background:#fa8c16;box-shadow:0 0 0 3px #fef5e7}
    .status-none{display:inline-block;width:10px;height:10px;border-radius:50%;background:#d9d9d9;box-shadow:0 0 0 3px #f0f2f5}
    .empty-state{text-align:center;padding:40px 20px;color:var(--text-light);font-size:.88rem}
    .site-footer{text-align:center;padding:20px 0 32px;font-size:.78rem;color:var(--text-light)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .hero{animation:fadeUp .35s ease both}
    .section{animation:fadeUp .35s ease .07s both}
    @media(max-width:768px){.topbar-time{display:none}.record-table thead th,.record-table tbody td{padding:9px 12px}.matrix-table th,.matrix-table td{padding:8px 10px}}
  </style>
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <a href="https://www.luogu.com.cn/user/728487" class="logo">
      <div class="logo-icon"><img src="../tx.jpg" alt="Showball's OI 工具箱"></div>
      <span>Showball's OI 工具箱</span>
    </a>
    <span class="topbar-time" id="clock"></span>
  </div>
</header>

<div class="container">
  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="hero">
    <div class="hero-badge" id="hero-badge"></div>
    <h1 id="hero-title">加载中…</h1>
    <p id="hero-desc"></p>
  </div>
  <div id="main-content"></div>
</div>

<footer class="site-footer">2026 &copy; Showball's OI 工具箱</footer>

<script>
const params  = new URLSearchParams(location.search);
const TYPE    = params.get('type');    // 'course' | 'topic' | 'content'
const ID      = params.get('id');
const COURSE  = params.get('course');  // only for type=content

function problemUrl(platform, pid) {
  if (platform === 'luogu') return `https://www.luogu.com.cn/problem/${pid}`;
  if (platform === 'codeforces') {
    const m = pid.match(/^(\d+)([A-Za-z]\d*)$/);
    return m ? `https://codeforces.com/problemset/problem/${m[1]}/${m[2]}` : 'https://codeforces.com/';
  }
  if (platform === 'atcoder') {
    const parts = pid.split('_'), contest = parts.slice(0,-1).join('_');
    return `https://atcoder.jp/contests/${contest}/tasks/${pid}`;
  }
  return '#';
}

function platformBadge(p) {
  const map = {luogu:'洛谷', codeforces:'CF', atcoder:'AtCoder'};
  return `<span class="platform-badge platform-${p}">${map[p]||p}</span>`;
}

function breadcrumb(items) {
  const base = [
    `<a href="../index.html">首页</a>`,
    `<span class="breadcrumb-sep">›</span>`,
    `<a href="../memos.html">备忘录</a>`
  ];
  items.forEach(item => {
    base.push(`<span class="breadcrumb-sep">›</span>`);
    base.push(item.href ? `<a href="${item.href}">${item.label}</a>` : `<span>${item.label}</span>`);
  });
  document.getElementById('breadcrumb').innerHTML = base.join('');
}

function renderLectureList(lectures) {
  if (!lectures.length) return `<div class="empty-state">暂无讲义</div>`;
  return `<div class="lecture-list">${lectures.map((l,i) => `
    <a class="lecture-card ${i%2===0?'stripe-blue':'stripe-yellow'}" href="../${l.href}">
      <div class="lecture-card-left">
        <span class="lecture-card-title">${l.title}</span>
        <div class="lecture-card-meta">
          <span>${l.created}</span>
          ${l.tags.length ? `<div class="lecture-tags">${l.tags.map(t=>`<span class="lecture-tag">${t}</span>`).join('')}</div>` : ''}
        </div>
      </div>
      <span class="lecture-arrow">→</span>
    </a>`).join('')}</div>`;
}

function renderProblemsTable(problems) {
  if (!problems.length) return `<div class="empty-state">暂无练习题目</div>`;
  return `<div class="table-card">
    <div class="table-toolbar">
      <span class="section-title" style="margin:0">练习题目</span>
      <span class="count-badge blue">共 ${problems.length} 题</span>
    </div>
    <table class="record-table">
      <thead><tr><th>#</th><th>题号 / 题名</th><th>平台</th></tr></thead>
      <tbody>${problems.map((p,i) => `<tr style="background:${i%2===0?'#ffffff':'#f6fbf2'}">
        <td style="color:var(--text-light);font-family:var(--mono);font-size:.8rem">${i+1}</td>
        <td><a class="pid-link" href="${problemUrl(p.platform,p.pid)}" target="_blank">${p.pid}&nbsp;&nbsp;${p.title}</a></td>
        <td>${platformBadge(p.platform)}</td>
      </tr>`).join('')}</tbody>
    </table>
  </div>`;
}

function renderMatrix(problems, students, subs) {
  if (!students.length) return `<div class="empty-state">暂无学生数据</div>`;
  if (!problems.length) return '';
  return `<div class="table-card">
    <div class="table-toolbar">
      <span class="section-title" style="margin:0">学生完成情况</span>
      <span class="count-badge purple">${students.length} 名学生</span>
    </div>
    <div class="matrix-wrap">
      <table class="matrix-table">
        <thead><tr>
          <th class="col-problem">题目</th>
          ${students.map(s=>`<th>${s.name}</th>`).join('')}
        </tr></thead>
        <tbody>${problems.map((p,i) => {
          const cells = students.map(s => {
            const data = ((subs[s.id]||{})[p.platform]||{})[p.pid];
            const status = typeof data === 'string' ? data : (data?.status ?? null);
            if (status === 'ac')        return `<td><span class="status-ac" title="已通过"></span></td>`;
            if (status === 'attempted') return `<td><span class="status-attempted" title="尝试中"></span></td>`;
            return `<td><span class="status-none" title="未做"></span></td>`;
          }).join('');
          return `<tr style="background:${i%2===0?'#ffffff':'#f6fbf2'}">
            <td class="col-problem"><a class="pid-link" href="${problemUrl(p.platform,p.pid)}" target="_blank">${p.pid} ${p.title}</a></td>
            ${cells}
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>
  </div>`;
}

async function init() {
  const [coursesRes, lecturesRes] = await Promise.all([
    fetch('../memos/courses.json'),
    fetch('../memos/lectures.json')
  ]);
  const coursesData = await coursesRes.json();
  const allLectures = await lecturesRes.json();

  // ── 知识点页：讲义列表 ──
  if (TYPE === 'topic') {
    const topic = (coursesData.topics||[]).find(t => t.id === ID);
    if (!topic) { document.getElementById('hero-title').textContent = '未找到知识点'; return; }
    document.title = `${topic.title} - OI 工具箱`;
    breadcrumb([{label: topic.title}]);
    document.getElementById('hero-badge').textContent = '知识点';
    document.getElementById('hero-badge').className = `hero-badge ${topic.color||'blue'}`;
    document.getElementById('hero-title').textContent = topic.title;
    const lecs = allLectures.filter(l => (l.topics||[]).includes(ID));
    document.getElementById('hero-desc').textContent = `${lecs.length} 篇讲义`;
    document.getElementById('main-content').innerHTML = `
      <div class="section"><div class="section-title">讲义列表</div>${renderLectureList(lecs)}</div>`;
    return;
  }

  // ── 课程页：课程内容列表 ──
  if (TYPE === 'course') {
    const course = (coursesData.courses||[]).find(c => c.id === ID);
    if (!course) { document.getElementById('hero-title').textContent = '未找到课程'; return; }
    document.title = `${course.title} - OI 工具箱`;
    breadcrumb([{label: course.title}]);
    document.getElementById('hero-badge').textContent = '课程';
    document.getElementById('hero-badge').className = `hero-badge ${course.color||'green'}`;
    document.getElementById('hero-title').textContent = course.title;
    const contents = course.contents || [];
    document.getElementById('hero-desc').textContent = `${contents.length} 个课程内容`;
    if (!contents.length) {
      document.getElementById('main-content').innerHTML = `<div class="empty-state">暂无课程内容</div>`;
      return;
    }
    document.getElementById('main-content').innerHTML = `
      <div class="section">
        <div class="content-grid">${contents.map((c, i) => {
          const lecCount = (c.lectures||[]).length;
          const probCount = (c.problems||[]).length;
          const stripe = i % 2 === 0 ? 'stripe-blue' : 'stripe-green';
          return `<a class="content-card ${stripe}" href="detail.html?type=content&course=${ID}&id=${c.id}">
            <div class="content-card-left">
              <span class="content-card-title">${c.title}</span>
              <div class="content-card-meta">
                <span>${lecCount} 篇讲义</span>
                <span>${probCount} 道练习</span>
              </div>
            </div>
            <span class="content-card-arrow">›</span>
          </a>`;
        }).join('')}</div>
      </div>`;
    return;
  }

  // ── 课程内容页：讲义 + 题目 + 学生矩阵 ──
  if (TYPE === 'content') {
    const course = (coursesData.courses||[]).find(c => c.id === COURSE);
    const content = (course?.contents||[]).find(c => c.id === ID);
    if (!content || !course) { document.getElementById('hero-title').textContent = '未找到内容'; return; }
    document.title = `${content.title} - OI 工具箱`;
    breadcrumb([
      {label: course.title, href: `detail.html?type=course&id=${COURSE}`},
      {label: content.title}
    ]);
    document.getElementById('hero-badge').textContent = course.title;
    document.getElementById('hero-badge').className = `hero-badge ${course.color||'green'}`;
    document.getElementById('hero-title').textContent = content.title;
    const lecs = allLectures.filter(l => (content.lectures||[]).includes(l.id));
    const problems = content.problems || [];
    document.getElementById('hero-desc').textContent = `${lecs.length} 篇讲义 · ${problems.length} 道练习`;

    let students = [], subs = {};
    try {
      const [stuRes, subRes] = await Promise.all([
        fetch('../students/students.json'),
        fetch('../students/submissions.json')
      ]);
      students = await stuRes.json();
      subs = (await subRes.json()).data || {};
    } catch(e) {}

    document.getElementById('main-content').innerHTML = `
      <div class="section"><div class="section-title">讲义</div>${renderLectureList(lecs)}</div>
      <div class="section">${renderProblemsTable(problems)}</div>
      <div class="section">${renderMatrix(problems, students, subs)}</div>`;
  }
}

(function tick() {
  const now = new Date(), p = n => String(n).padStart(2,'0');
  document.getElementById('clock').textContent =
    now.getFullYear()+'-'+p(now.getMonth()+1)+'-'+p(now.getDate())+
    ' '+p(now.getHours())+':'+p(now.getMinutes())+':'+p(now.getSeconds());
  setTimeout(tick, 1000);
})();

init();
</script>
</body>
</html>
