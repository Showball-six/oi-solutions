<html lang="zh-CN">

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green:#52C41A; --green-light:#f0fbe8; --green-dark:#3da613;
      --blue:#3498db;  --blue-light:#ebf5fb;
      --orange:#e67e22;--orange-light:#fef5e7;
      --purple:#9d3dcf;--purple-light:#f5eefa;
      --bg:#f4f5f7; --white:#fff; --text:#1a1a1a;
      --text-sub:#8e8e93; --text-light:#b0b0b6; --border:#e8eaed;
      --shadow-sm:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.06);
      --shadow-md:0 4px 12px rgba(0,0,0,.08);
      --radius:10px;
      --font:'Noto Sans SC',-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
      --mono:'Menlo','Consolas','Courier New',monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
    a{color:var(--green-dark);text-decoration:none;transition:color .15s}
    a:hover{color:var(--green)}

    /* ── 顶栏 ── */
    .topbar{background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
    .topbar-inner{max-width:1060px;margin:0 auto;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.1rem;color:var(--text)}
    .logo:hover{text-decoration:none;color:var(--text)}
    .logo-icon{width:32px;height:32px;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#fff;box-shadow:var(--shadow-sm)}
    .logo-icon img{width:100%;height:100%;object-fit:cover;display:block}
    .topbar-time{font-size:.78rem;color:var(--text-light);font-family:var(--mono)}

    /* ── 容器 ── */
    .container{max-width:1060px;margin:0 auto;padding:28px 24px 60px}

    /* ── 标题 ── */
    .hero{margin-bottom:24px}
    .hero h1{font-size:1.55rem;font-weight:700;letter-spacing:-.01em}
    .hero p{margin-top:6px;color:var(--text-sub);font-size:.88rem}

    /* ── 导航卡片 ── */
    .nav-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
    .nav-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;display:flex;align-items:center;gap:14px;transition:all .2s;text-decoration:none!important;color:var(--text)!important}
    .nav-card:hover{box-shadow:var(--shadow-md);border-color:transparent;transform:translateY(-2px)}
    .nav-card-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .nav-card-icon.green {background:var(--green-light);color:var(--green-dark)}
    .nav-card-icon.blue  {background:var(--blue-light);color:var(--blue)}
    .nav-card-icon.orange{background:var(--orange-light);color:var(--orange)}
    .nav-card-icon.purple{background:var(--purple-light);color:var(--purple)}
    .nav-card-text{display:flex;flex-direction:column}
    .nav-card-title{font-weight:600;font-size:.92rem}
    .nav-card-desc{font-size:.75rem;color:var(--text-sub);margin-top:2px}

    /* ── 表格卡片 ── */
    .table-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden}

    /* ── 工具栏 ── */
    .table-toolbar{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .toolbar-left{display:flex;align-items:center;gap:12px;flex-shrink:0}
    .table-title{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:8px}
    .table-title::before{content:'';width:4px;height:18px;background:var(--green);border-radius:2px;display:inline-block}
    .count-badge{font-size:.72rem;font-weight:500;background:var(--green-light);color:var(--green-dark);padding:2px 10px;border-radius:20px}

    /* ── 搜索框 ── */
    .search-wrap{position:relative;flex:1;max-width:320px}
    .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-light);pointer-events:none}
    .search-input{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--border);border-radius:8px;font-size:.85rem;font-family:var(--font);outline:none;transition:border-color .15s,box-shadow .15s;background:#fafbfc;color:var(--text)}
    .search-input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(82,196,26,.12);background:var(--white)}
    .search-input::placeholder{color:var(--text-light)}

    /* ── 表格 ── */
    .record-table{width:100%;border-collapse:collapse;font-size:.88rem}
    .record-table thead th{text-align:left;padding:11px 20px;font-weight:600;font-size:.75rem;color:var(--text-sub);text-transform:uppercase;letter-spacing:.05em;background:#fafbfc;border-bottom:1px solid var(--border);white-space:nowrap}
    .record-table thead th.sortable{cursor:pointer;user-select:none;position:relative;padding-right:32px}
    .record-table thead th.sortable::after{content:'↕';position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:.75rem;color:var(--text-light);font-family:var(--mono);letter-spacing:0}
    .record-table thead th.sortable.asc::after{content:'↑';color:var(--green-dark)}
    .record-table thead th.sortable.desc::after{content:'↓';color:var(--green-dark)}
    .record-table tbody tr{transition:background .1s}
    .record-table tbody tr:hover{background:#f7fbf3}
    .record-table tbody td{padding:13px 20px;border-bottom:1px solid #f0f1f3;vertical-align:middle}
    .record-table tbody tr:last-child td{border-bottom:none}
    .col-id{font-family:var(--mono);font-size:.8rem;color:var(--text-light);width:70px}
    .col-problem a{color:var(--text);font-weight:500}
    .col-problem a:hover{color:var(--green)}
    .problem-source{font-size:.73rem;color:var(--text-light);margin-top:2px}
    .col-solution a{display:inline-flex;align-items:center;gap:4px;color:var(--green-dark);font-weight:500;font-size:.82rem;padding:4px 12px;border-radius:6px;background:var(--green-light);transition:all .15s;white-space:nowrap}
    .col-solution a:hover{background:var(--green);color:#fff;text-decoration:none}

    /* ── 洛谷标准难度颜色 ── */
    /* ── 洛谷标准难度颜色 ── */
.diff-tag{
  display:inline-block;
  font-size:.75rem;
  font-weight:700;
  padding:3px 10px;
  border-radius:4px;
  white-space:nowrap;
  color:#fff;
}

.diff-beginner {background:#FE4C61;}          /* 入门 */
.diff-basic-minus {background:#F39C11;}       /* 普及- */
.diff-basic-improve-minus {background:#FFC116;}                                             /* 普及/提高- */
.diff-basic-improve {background:#52C41A;}     /* 普及/提高 */
.diff-improve-province-minus {background:#3498DB;} /* 提高/省选- */
.diff-province-noi-minus {background:#9D3DCF;}      /* 省选/NOI- */
.diff-noi {background:#0E1D69;}               /* NOI */
.diff-unrated {background:#BFBFBF;}           /* 未评定 */

    /* ── 算法标签 ── */
    .algo-tags{display:flex;flex-wrap:wrap;gap:5px}
    .algo-tag{font-size:.72rem;padding:2px 8px;border-radius:4px;background:#f0f2f5;color:#5f6368;white-space:nowrap;transition:background .12s}
    tr:hover .algo-tag{background:#e6ede0}

    /* ── 无结果 ── */
    .no-results{text-align:center;padding:40px 20px;color:var(--text-light);font-size:.88rem;display:none}
    .no-results.show{display:block}

    /* ── 分页 ── */
    .pagination-wrap{padding:14px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
    .page-info{font-size:.8rem;color:var(--text-sub)}
    .page-btns{display:flex;gap:4px;align-items:center}
    .page-btn{min-width:32px;height:32px;padding:0 10px;border:1px solid var(--border);border-radius:6px;background:var(--white);color:var(--text);font-size:.82rem;font-family:var(--font);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
    .page-btn:hover:not(:disabled){border-color:var(--green);color:var(--green)}
    .page-btn.active{background:var(--green);color:#fff;border-color:var(--green);font-weight:600}
    .page-btn:disabled{opacity:.4;cursor:not-allowed}
    .page-ellipsis{font-size:.82rem;color:var(--text-light);padding:0 4px}

    /* ── 页脚 ── */
    .site-footer{text-align:center;padding:20px 0 32px;font-size:.78rem;color:var(--text-light)}

    /* ── 动画 ── */
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .hero      {animation:fadeUp .35s ease both}
    .nav-cards {animation:fadeUp .35s ease .07s both}
    .table-card{animation:fadeUp .35s ease .14s both}

    /* ── 响应式 ── */
    @media(max-width:768px){
      .nav-cards{grid-template-columns:repeat(2,1fr);gap:10px}
      .record-table thead th,.record-table tbody td{padding:10px 14px}
      .record-table{font-size:.82rem}
      .topbar-time{display:none}
    }
    @media(max-width:480px){
      .nav-cards{grid-template-columns:1fr}
      .hero h1{font-size:1.3rem}
      .container{padding:20px 0 48px}
      .table-card{border-radius:0;border-left:none;border-right:none}
      .search-wrap{max-width:100%;flex:unset;width:100%}
      .table-toolbar{flex-direction:column;align-items:flex-start}
    }
  </style>
</head>

<script>
const PAGE_SIZE = 10;
let records = [];
let filtered = [];
let currentPage = 1;
let sortKey = 'id';
let sortDir = 'desc';

const difficultyRank = {
  '入门':      0,
  '普及-':    1,
  '普及/提高-': 2,
  '普及+/提高':  3,
  '提高+/省选-': 4,
  '省选/NOI-': 5,
  'NOI':      6
};

const difficultyClassMap = {
  '入门': 'beginner',
  '普及-': 'basic-minus',
  '普及/提高-': 'basic-improve-minus',
  '普及+/提高': 'basic-improve',
  '提高+/省选-': 'improve-province-minus',
  '省选/NOI-': 'province-noi-minus',
  'NOI': 'noi',
  '未评定': 'unrated'
};

function getDifficultyClass(diff) {
  return difficultyClassMap[diff] || 'unrated';
}

const tbody      = document.getElementById('table-body');
const noResults  = document.getElementById('no-results');
const countBadge = document.getElementById('count-badge');
const pageInfo   = document.getElementById('page-info');
const pageBtns   = document.getElementById('page-btns');

/* ============ 核心：加载JSON数据 ============ */
async function loadRecords() {
  try {
    // 获取solutions目录下所有JSON文件
    const response = await fetch('solutions/records.json');
    
    if (!response.ok) {
      console.error('无法加载 records.json');
      showEmptyState();
      return;
    }

    records = await response.json();

    if (records.length === 0) {
      showEmptyState();
      return;
    }

    filtered = [...records];
    applySort();
    render();
  } catch (err) {
    console.error('加载记录失败:', err);
    showEmptyState();
  }
}


/* 构建一行 HTML */
function buildRow(r) {
  // 题目原站链接处理：洛谷 / Codeforces / AtCoder
  let problemUrl = r.problemUrl || '';
  let sourceName = r.source;

  if (!problemUrl && r.source === 'CF') {
    const m = r.pid.replace('CF','').match(/^(\d+)([A-Z]\d*)$/);
    problemUrl = m
      ? 'https://codeforces.com/problemset/problem/' + m[1] + '/' + m[2]
      : 'https://codeforces.com/';
    sourceName = 'Codeforces';
  } else if (!problemUrl && r.source === 'AtCoder') {
    const m = r.pid.match(/^([A-Z]+)(\d+)([A-Z])$/i);
    if (m) {
      const contest = (m[1] + m[2]).toLowerCase();
      problemUrl = 'https://atcoder.jp/contests/' + contest + '/tasks/' + contest + '_' + m[3].toLowerCase();
    } else {
      problemUrl = 'https://atcoder.jp/';
    }
    sourceName = 'AtCoder';
  } else if (!problemUrl) {
    problemUrl = 'https://www.luogu.com.cn/problem/' + r.pid;
    sourceName = '洛谷';
  } else if (r.source === 'CF') {
    sourceName = 'Codeforces';
  }

  return `<tr>
    <td class="col-id">#${r.id}</td>
    <td class="col-problem">
      <a href="${problemUrl}" target="_blank">${r.pid}&nbsp;&nbsp;${r.title}</a>
      <div class="problem-source">${sourceName}</div>
    </td>
    <td class="col-solution"><a href="${r.href}">查看题解 →</a></td>
    <td><span class="diff-tag diff-${getDifficultyClass(r.diff)}">${r.diff||'未评定'}</span></td>
    <td><div class="algo-tags">${r.tags.map(t => `<span class="algo-tag">${t}</span>`).join('')}</div></td>
  </tr>`;
}

/* 排序：点击编号 / 题号 / 难度时，对全部匹配记录排序 */
function compareRecords(a, b, key) {
  if (key === 'id') {
    return Number(a.id) - Number(b.id);
  }
  if (key === 'pid') {
    return a.pid.localeCompare(b.pid, undefined, { numeric: true, sensitivity: 'base' });
  }
  if (key === 'difficulty') {
    const ar = difficultyRank[a.diff] ?? 999;
    const br = difficultyRank[b.diff] ?? 999;
    return ar === br
      ? a.pid.localeCompare(b.pid, undefined, { numeric: true, sensitivity: 'base' })
      : ar - br;
  }
  return 0;
}

function applySort() {
  filtered.sort((a, b) => {
    const result = compareRecords(a, b, sortKey);
    return sortDir === 'asc' ? result : -result;
  });
}

function updateSortIndicators() {
  document.querySelectorAll('.record-table thead th.sortable').forEach(th => {
    th.classList.remove('asc', 'desc');
    if (th.dataset.sort === sortKey) th.classList.add(sortDir);
  });
}

/* 生成页码数组（超过 7 页折叠中间） */
function pageRange(cur, total) {
  if (total <= 7) return Array.from({length: total}, (_, i) => i + 1);
  if (cur <= 4)        return [1, 2, 3, 4, 5, '…', total];
  if (cur >= total-3)  return [1, '…', total-4, total-3, total-2, total-1, total];
  return [1, '…', cur-1, cur, cur+1, '…', total];
}

/* 渲染表格 + 分页 */
function render() {
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  updateSortIndicators();

  const start = (currentPage - 1) * PAGE_SIZE;
  tbody.innerHTML = filtered.slice(start, start + PAGE_SIZE).map(buildRow).join('');

  countBadge.textContent = '共 ' + total + ' 题';
  noResults.classList.toggle('show', total === 0);

  if (total === 0) { pageInfo.textContent = ''; pageBtns.innerHTML = ''; return; }

  pageInfo.textContent =
    '第 ' + (start + 1) + '–' + Math.min(start + PAGE_SIZE, total) + ' 条，共 ' + total + ' 条';

  let html = `<button class="page-btn" id="btn-prev" ${currentPage === 1 ? 'disabled' : ''}>‹</button>`;
  pageRange(currentPage, totalPages).forEach(p => {
    html += p === '…'
      ? `<span class="page-ellipsis">…</span>`
      : `<button class="page-btn ${p === currentPage ? 'active' : ''}" data-p="${p}">${p}</button>`;
  });
  html += `<button class="page-btn" id="btn-next" ${currentPage === totalPages ? 'disabled' : ''}>›</button>`;
  pageBtns.innerHTML = html;

  pageBtns.querySelectorAll('.page-btn[data-p]').forEach(b =>
    b.addEventListener('click', () => { currentPage = +b.dataset.p; render(); })
  );
  const prev = document.getElementById('btn-prev');
  const next = document.getElementById('btn-next');
  if (prev) prev.addEventListener('click', () => { currentPage--; render(); });
  if (next) next.addEventListener('click', () => { currentPage++; render(); });
}

/* 表头排序 */
document.querySelectorAll('.record-table thead th.sortable').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.sort;
    if (sortKey === key) {
      sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      sortKey = key;
      sortDir = 'asc';
    }
    currentPage = 1;
    applySort();
    render();
  });
});

/* 搜索 */
document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  filtered = q
    ? records.filter(r => (r.pid + ' ' + r.title + ' ' + r.tags.join(' ')).toLowerCase().includes(q))
    : [...records];
  currentPage = 1;
  applySort();
  render();
});

applySort();
render();

/* 时钟 */
(function tick() {
  const now = new Date();
  const p = n => String(n).padStart(2, '0');
  document.getElementById('clock').textContent =
    now.getFullYear() + '-' + p(now.getMonth()+1) + '-' + p(now.getDate()) +
    ' ' + p(now.getHours()) + ':' + p(now.getMinutes()) + ':' + p(now.getSeconds());
  setTimeout(tick, 1000);
})();

/* 初始化：加载数据 */
loadRecords();
