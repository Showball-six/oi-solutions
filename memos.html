<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>备忘录 - OI 工具箱</title>
  <link rel="icon" href="tx.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green:#52C41A; --green-light:#f0fbe8; --green-dark:#3da613;
      --blue:#3498db;  --blue-light:#ebf5fb;
      --orange:#e67e22;--orange-light:#fef5e7;
      --purple:#9d3dcf;--purple-light:#f5eefa;
      --bg:#f4f5f7; --white:#fff; --text:#1a1a1a;
      --text-sub:#8e8e93; --text-light:#b0b0b6; --border:#e8eaed;
      --shadow-sm:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.06);
      --shadow-md:0 4px 12px rgba(0,0,0,.08);
      --radius:10px;
      --font:'Noto Sans SC',-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
    a{color:var(--green-dark);text-decoration:none;transition:color .15s}
    a:hover{color:var(--green)}

    .topbar{background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
    .topbar-inner{max-width:1060px;margin:0 auto;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.1rem;color:var(--text)}
    .logo:hover{text-decoration:none;color:var(--text)}
    .logo-icon{width:32px;height:32px;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#fff;box-shadow:var(--shadow-sm)}
    .logo-icon img{width:100%;height:100%;object-fit:cover;display:block}
    .topbar-time{font-size:.78rem;color:var(--text-light);font-family:'Menlo','Consolas',monospace}

    .container{max-width:1060px;margin:0 auto;padding:28px 24px 60px}

    .hero{margin-bottom:24px}
    .hero h1{font-size:1.55rem;font-weight:700;letter-spacing:-.01em}
    .hero p{margin-top:6px;color:var(--text-sub);font-size:.88rem}

    .nav-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
    .nav-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;display:flex;align-items:center;gap:14px;transition:all .2s;text-decoration:none!important;color:var(--text)!important}
    .nav-card:hover{box-shadow:var(--shadow-md);border-color:transparent;transform:translateY(-2px)}
    .nav-card-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .nav-card-icon.green {background:var(--green-light);color:var(--green-dark)}
    .nav-card-icon.blue  {background:var(--blue-light);color:var(--blue)}
    .nav-card-icon.orange{background:var(--orange-light);color:var(--orange)}
    .nav-card-icon.purple{background:var(--purple-light);color:var(--purple)}
    .nav-card-text{display:flex;flex-direction:column}
    .nav-card-title{font-weight:600;font-size:.92rem}
    .nav-card-desc{font-size:.75rem;color:var(--text-sub);margin-top:2px}

    .section-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden;margin-bottom:20px}
    .section-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
    .section-title{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:8px}
    .section-title::before{content:'';width:4px;height:18px;border-radius:2px;display:inline-block}
    .section-title.purple-bar::before{background:var(--purple)}
    .section-title.blue-bar::before{background:var(--blue)}
    .section-desc{font-size:.8rem;color:var(--text-sub);margin-left:auto}
    .section-body{padding:20px}

    .memo-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
    .topic-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:12px}
    .memo-card{display:flex;flex-direction:column;align-items:center;gap:10px;padding:18px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--white);text-decoration:none!important;color:var(--text)!important;transition:all .2s;cursor:pointer}
    .memo-card:hover{box-shadow:var(--shadow-md);border-color:transparent;transform:translateY(-2px)}
    .memo-card-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem}
    .memo-card-icon.green {background:var(--green-light);color:var(--green-dark)}
    .memo-card-icon.blue  {background:var(--blue-light);color:var(--blue)}
    .memo-card-icon.orange{background:var(--orange-light);color:var(--orange)}
    .memo-card-icon.purple{background:var(--purple-light);color:var(--purple)}
    .memo-card-title{font-size:.82rem;font-weight:600;text-align:center;line-height:1.4}
    .memo-card-count{font-size:.72rem;color:var(--text-light)}

    .site-footer{text-align:center;padding:20px 0 32px;font-size:.78rem;color:var(--text-light)}

    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .hero      {animation:fadeUp .35s ease both}
    .nav-cards {animation:fadeUp .35s ease .07s both}
    .section-card:nth-child(1){animation:fadeUp .35s ease .14s both}
    .section-card:nth-child(2){animation:fadeUp .35s ease .21s both}

    @media(max-width:900px){.memo-grid{grid-template-columns:repeat(3,1fr)}.topic-grid{grid-template-columns:repeat(4,1fr)}}
    @media(max-width:768px){.nav-cards{grid-template-columns:repeat(2,1fr)}.topbar-time{display:none}}
    @media(max-width:480px){.nav-cards{grid-template-columns:1fr}.memo-grid{grid-template-columns:repeat(2,1fr)}.topic-grid{grid-template-columns:repeat(3,1fr)}.container{padding:20px 0 48px}.section-card{border-radius:0;border-left:none;border-right:none}}
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="index.html" class="logo">
      <div class="logo-icon"><img src="tx.jpg" alt="OI 工具箱"></div>
      <span>Showball's OI 工具箱</span>
    </a>
    <span class="topbar-time" id="clock"></span>
  </div>
</header>

<div class="container">
  <div class="hero">
    <h1>课程</h1>
    <p>课程讲义 · 知识点整理 · 学生练习追踪</p>
  </div>

  <div class="nav-cards">
     <a href="index.html" class="nav-card">
      <div class="nav-card-icon green">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      </div>
      <div class="nav-card-text">
        <span class="nav-card-title">做题记录</span>
        <span class="nav-card-desc">题解与代码归档</span>
      </div>
    </a>
     <a href="memos.html" class="nav-card">
      <div class="nav-card-icon purple">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      </div>
      <div class="nav-card-text">
        <span class="nav-card-title">课程</span>
        <span class="nav-card-desc">知识点与笔记</span>
      </div>
    </a>
    <a href="templates.html" class="nav-card">
      <div class="nav-card-icon orange">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      </div>
      <div class="nav-card-text">
        <span class="nav-card-title">模板</span>
        <span class="nav-card-desc">常用代码模板</span>
      </div>
    </a>
    <a href="tools.html" class="nav-card">
      <div class="nav-card-icon blue">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </div>
      <div class="nav-card-text">
        <span class="nav-card-title">小工具</span>
        <span class="nav-card-desc">实用辅助工具</span>
      </div>
    </a>
  </div>

  <div class="section-card">
    <div class="section-header">
      <h2 class="section-title purple-bar">课程</h2>
      <span class="section-desc">包含讲义、练习题目与学生完成情况</span>
    </div>
    <div class="section-body">
      <div class="memo-grid" id="courses-grid">
        <div style="color:var(--text-light);font-size:.85rem">加载中...</div>
      </div>
    </div>
  </div>

  <div class="section-card">
    <div class="section-header">
      <h2 class="section-title blue-bar">知识点</h2>
      <span class="section-desc">按算法分类整理的讲义</span>
    </div>
    <div class="section-body">
      <div class="topic-grid" id="topics-grid">
        <div style="color:var(--text-light);font-size:.85rem">加载中...</div>
      </div>
    </div>
  </div>
</div>

<footer class="site-footer">2026 &copy; Showball's OI 工具箱</footer>

<script>
const COURSE_ICONS = {
  'syntax-basics':     '📝',
  'algo-basics':       '🔢',
  'basics-to-improve': '📈',
  'algo-improve':      '⚡',
  'contest-prep':      '🏆'
};
const TOPIC_ICONS = {
  'dp':         '🧩',
  'basic-algo': '🔍',
  'ds':         '🌲',
  'math':       '📐',
  'graph':      '🕸️',
  'misc':       '🎲',
  'string':     '🔤'
};

async function init() {
  try {
    const [coursesRes, lecturesRes] = await Promise.all([
      fetch('memos/courses.json'),
      fetch('memos/lectures.json')
    ]);
    const { courses, topics } = await coursesRes.json();
    const lectures = await lecturesRes.json();

    const coursesGrid = document.getElementById('courses-grid');
    coursesGrid.innerHTML = courses.map(c => {
      const count = lectures.filter(l => l.courses && l.courses.includes(c.id)).length;
      return `<a href="memos/detail.html?type=course&id=${c.id}" class="memo-card">
        <div class="memo-card-icon ${c.color}">${COURSE_ICONS[c.id] || '📚'}</div>
        <div class="memo-card-title">${c.title}</div>
        <div class="memo-card-count">${count} 篇讲义 · ${(c.contents||[]).reduce((s,ct)=>s+(ct.problems||[]).length,0)} 道练习</div>
      </a>`;
    }).join('');

    const topicsGrid = document.getElementById('topics-grid');
    topicsGrid.innerHTML = topics.map(t => {
      const count = lectures.filter(l => l.topics && l.topics.includes(t.id)).length;
      return `<a href="memos/detail.html?type=topic&id=${t.id}" class="memo-card">
        <div class="memo-card-icon ${t.color}">${TOPIC_ICONS[t.id] || '📖'}</div>
        <div class="memo-card-title">${t.title}</div>
        <div class="memo-card-count">${count} 篇讲义</div>
      </a>`;
    }).join('');
  } catch (e) {
    console.error('加载失败:', e);
  }
}

(function tick() {
  const now = new Date(), p = n => String(n).padStart(2,'0');
  document.getElementById('clock').textContent =
    now.getFullYear()+'-'+p(now.getMonth()+1)+'-'+p(now.getDate())+
    ' '+p(now.getHours())+':'+p(now.getMinutes())+':'+p(now.getSeconds());
  setTimeout(tick, 1000);
})();

init();
</script>
</body>
</html>
